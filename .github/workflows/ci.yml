name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14.5"
          cache-dependency-glob: uv.lock

      - name: Sync (dev)
        run: uv sync --extra dev

      - name: Type check (ty)
        run: uv run ty check dailies

      - name: Test (unit + tui)
        run: uv run pytest -m "not integration"

      - name: Build + smoke-test wheel in a fresh venv
        run: |
          uv build
          rm -rf .wheel-smoke
          uv venv --seed .wheel-smoke
          uv pip install --python .wheel-smoke/bin/python dist/*.whl
          .wheel-smoke/bin/dly --help

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14.5"
          cache-dependency-glob: uv.lock

      - name: Sync (dev)
        run: uv sync --extra dev

      - name: Test (integration — Docker/Mongo)
        run: uv run pytest -m integration
