# Great Docs configuration — https://posit-dev.github.io/great-docs/
# Build: uv run great-docs build · Preview: uv run great-docs preview

module: dailies
display_name: dailies
parser: google
dynamic: true
repo: https://github.com/yasyf/dailies
site_url: "https://yasyf.github.io/dailies/"
pypi: true
github_style: widget
jupyter: python3

navbar_style: lilac
content_style: lilac
# Sunrise amber — daily, recurring, start-of-day.
accent_color:
  light: "#f97316"
  dark: "#fb923c"
dark_mode_toggle: true
back_to_top: true
keyboard_nav: true

hero:
  name: dailies
  tagline: "Daily automation and scheduled task runner."
  starfield: true

# Narrative doc sections are optional — dynamic mode generates the API reference
# from docstrings without them. Uncomment and point at docs/ dirs as they appear.
# sections:
#   - title: Getting Started
#     dir: docs/getting-started
#     index: true
#   - title: Guide
#     dir: docs/guide
#     navbar_after: Getting Started
#     index: true

cli:
  enabled: true
  module: dailies.cli
  name: cli

authors:
  - name: Yasyf Mohamedali
    role: Maintainer
    github: yasyf
    email: yasyfm@gmail.com

# Curated symbol reference (public API only). Optional — without it, dynamic
# mode documents everything in dailies.__all__.
# reference:
#   - title: Core
#     desc: The main entry points.
#     contents:
#       - SomePublicClass
#       - some_public_function
